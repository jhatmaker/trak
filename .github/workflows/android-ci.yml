name: Android CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'android/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'android/**'

defaults:
  run:
    working-directory: android

jobs:
  # ── Build + unit test ────────────────────────────────────────────────────────
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties with placeholder API URL
        run: |
          echo "trak.api.url.dev=https://placeholder.execute-api.us-east-1.amazonaws.com/dev" \
            > local.properties

      - name: Run unit tests
        run: ./gradlew test --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-results
          path: android/app/build/reports/tests/

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: trak-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Release build (on merge to main) ─────────────────────────────────────────
  release:
    name: Release build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties with prod API URL
        run: |
          echo "trak.api.url=https://api.trackmyraces.com/prod" > local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/trak-release.keystore

      - name: Build release AAB
        run: ./gradlew bundleRelease --stacktrace
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=512m"
          KEYSTORE_PATH:      "trak-release.keystore"
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: trak-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
