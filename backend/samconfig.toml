# samconfig.toml — SAM deployment configuration
version = 0.1

[default.global.parameters]
stack_name = "trak"

[default.build.parameters]
parallel = true

[default.validate.parameters]
lint = true

# ── Dev environment ───────────────────────────────────────────────────────────
[dev.global.parameters]
region = "us-east-1"

[dev.deploy.parameters]
stack_name          = "trak-dev"
s3_bucket           = "trak-sam-artifacts-dev"
s3_prefix           = "trak-dev"
region              = "us-east-1"
confirm_changeset   = true
capabilities        = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Stage=\"dev\" AnthropicSecretName=\"trak/anthropic-api-key\" JwtSecretName=\"trak/jwt-secret\" VpcId=\"vpc-REPLACE_DEV\" DbSubnetIds=\"subnet-REPLACE_DEV_1,subnet-REPLACE_DEV_2\" DbName=\"trak\" DbMasterUsername=\"trakadmin\""

# ── Production environment ────────────────────────────────────────────────────
[prod.deploy.parameters]
stack_name          = "trak-prod"
s3_bucket           = "trak-sam-artifacts-prod"
s3_prefix           = "trak"
region              = "us-east-1"
confirm_changeset   = true
capabilities        = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Stage=\"prod\" AnthropicSecretName=\"trak/anthropic-api-key\" JwtSecretName=\"trak/jwt-secret\" VpcId=\"vpc-REPLACE_PROD\" DbSubnetIds=\"subnet-REPLACE_PROD_1,subnet-REPLACE_PROD_2\" DbName=\"trak\" DbMasterUsername=\"trakadmin\""
