AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trak backend — AI-powered race result extraction platform

# ─── Parameters ──────────────────────────────────────────────────────────────
Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  AnthropicSecretName:
    Type: String
    Default: trak/anthropic-api-key
  JwtSecretName:
    Type: String
    Default: trak/jwt-secret
  HostedZoneId:
    Type: String
    Default: Z07221791SG93GBUMA7Y7
    Description: Route 53 hosted zone ID for trackmyraces.com

  # ── Aurora PostgreSQL / VPC ────────────────────────────────────────────────
  VpcId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    Description: SSM path to the VPC ID (e.g. /trak/dev/vpc-id)
  DbSubnetIds:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
    Description: SSM path to comma-delimited private subnet IDs (e.g. /trak/dev/db-subnet-ids)
  DbName:
    Type: String
    Default: trak
    Description: PostgreSQL database name
  DbMasterUsername:
    Type: String
    Default: trakadmin
    Description: Aurora master username (also used for IAM auth token generation)

# ─── Conditions ───────────────────────────────────────────────────────────────
Conditions:
  IsProd: !Equals [!Ref Stage, prod]

# ─── Globals ──────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 60
    MemorySize: 512
    Environment:
      Variables:
        STAGE:                 !Ref Stage
        DYNAMODB_TABLE_NAME:   !Ref TrakTable
        ANTHROPIC_SECRET_NAME: !Ref AnthropicSecretName
        JWT_SECRET_NAME:       !Ref JwtSecretName
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
    Layers:
      - !Ref SharedLayer
    Tracing: Active

# ─── Resources ────────────────────────────────────────────────────────────────
Resources:

  # ── Shared layer (shared/ code + node_modules) ───────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub trak-shared-${Stage}
      Description: Shared utilities, DB client, constants
      ContentUri: ./
      CompatibleRuntimes: [nodejs20.x]
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: makefile

  # ── DynamoDB single-table ────────────────────────────────────────────────
  TrakTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub trak-${Stage}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: PK,          AttributeType: S }
        - { AttributeName: SK,          AttributeType: S }
        - { AttributeName: GSI1PK,      AttributeType: S }
        - { AttributeName: GSI1SK,      AttributeType: S }
        - { AttributeName: GSI2PK,      AttributeType: S }
        - { AttributeName: GSI2SK,      AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH  }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        # GSI1: query all claims for a race event (club leaderboard)
        - IndexName: byRaceEvent
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH  }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        # GSI2: query by canonical race name (race-over-years view)
        - IndexName: byCanonicalRace
          KeySchema:
            - { AttributeName: GSI2PK, KeyType: HASH  }
            - { AttributeName: GSI2SK, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage  }

  # ── API Gateway ──────────────────────────────────────────────────────────
  TrakApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub trak-api-${Stage}
      StageName: !Ref Stage
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Runner-Id'"
        AllowOrigin:  "'*'"
      Auth:
        DefaultAuthorizer: JwtAuthorizer
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthFunction.Arn
            Identity:
              Header: Authorization
              ReauthorizeEvery: 300
        AddDefaultAuthorizerToCorsPreflight: false

  # ── IAM role shared by all Lambdas ───────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub trak-lambda-role-${Stage}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: TrakPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt TrakTable.Arn
                  - !Sub "${TrakTable.Arn}/index/*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AnthropicSecretName}*"
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${JwtSecretName}*"
              - Effect: Allow
                Action: rds-db:connect
                Resource:
                  - !Sub "arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/${DbMasterUsername}"

  # ── Lambda: Auth (JWT authoriser) ────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-auth-${Stage}
      CodeUri: functions/auth/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: JWT token authoriser for API Gateway

  # ── Lambda: Extract ──────────────────────────────────────────────────────
  ExtractFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-extract-${Stage}
      CodeUri: functions/extract/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 90
      MemorySize: 1024
      Description: AI-powered race result extraction via Anthropic
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /extract
            Method: POST

  # ── Lambda: Claims ───────────────────────────────────────────────────────
  ClaimsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-claims-${Stage}
      CodeUri: functions/claims/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Create, confirm, and manage result claims
      Events:
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /claims
            Method: POST
        Delete:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /claims/{claimId}
            Method: DELETE

  # ── Lambda: Results ──────────────────────────────────────────────────────
  ResultsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-results-${Stage}
      CodeUri: functions/results/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Fetch and filter race result lists
      Events:
        List:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /results
            Method: GET
        Single:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /results/{resultId}
            Method: GET
        Sync:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /results
            Method: POST
        Update:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /results/{resultId}
            Method: PUT

  # ── Lambda: Profile ──────────────────────────────────────────────────────
  ProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-profile-${Stage}
      CodeUri: functions/profile/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Runner profile CRUD
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /profile
            Method: GET
        Put:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /profile
            Method: PUT
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /profile
            Method: POST
        Delete:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /profile
            Method: DELETE

  # ── Lambda: Register ─────────────────────────────────────────────────────
  RegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-register-${Stage}
      CodeUri: functions/register/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: User registration — create account and return JWT
      Events:
        Register:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /auth/register
            Method: POST
            Auth:
              Authorizer: NONE

  # ── Lambda: Login ─────────────────────────────────────────────────────────
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-login-${Stage}
      CodeUri: functions/login/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: User login — verify credentials and return JWT
      Events:
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /auth/login
            Method: POST
            Auth:
              Authorizer: NONE

  # ── Lambda: Discover ─────────────────────────────────────────────────────
  DiscoverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-discover-${Stage}
      CodeUri: functions/discover/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 90
      MemorySize: 512
      Description: Search default running sites for a runner — no auth required
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /discover
            Method: POST
            Auth:
              Authorizer: NONE

  # ── Lambda: Views ────────────────────────────────────────────────────────
  ViewsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-views-${Stage}
      CodeUri: functions/views/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Saved view presets CRUD
      Events:
        List:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /views
            Method: GET
        Upsert:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /views/{viewId}
            Method: PUT
        Delete:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /views/{viewId}
            Method: DELETE

  # ── Security groups (VPC — Lambda / RDS Proxy / Aurora / VPC endpoints) ──
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda functions that connect to RDS Proxy
      VpcId: !Ref VpcId
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  RdsProxySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS Proxy - accepts PostgreSQL from Lambda SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora cluster - accepts PostgreSQL from RDS Proxy SG only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref RdsProxySecurityGroup
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  # ── Aurora PostgreSQL Serverless v2 ───────────────────────────────────────
  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for Aurora Serverless v2
      SubnetIds: !Ref DbSubnetIds
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  AuroraSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub trak/${Stage}/aurora-master
      Description: Aurora master password — managed by Secrets Manager rotation
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username":"${DbMasterUsername}"}'
        GenerateStringKey: password
        ExcludePunctuation: true
        PasswordLength: 32
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBClusterIdentifier: !Sub trak-aurora-${Stage}
      Engine: aurora-postgresql
      EngineVersion: '16.6'
      DatabaseName: !Ref DbName
      MasterUsername: !Sub '{{resolve:secretsmanager:${AuroraSecret}:SecretString:username}}'
      MasterUserPassword: !Sub '{{resolve:secretsmanager:${AuroraSecret}:SecretString:password}}'
      DBSubnetGroupName: !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroup
      EnableIAMDatabaseAuthentication: true
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5
        MaxCapacity: 4
      BackupRetentionPeriod: 7
      StorageEncrypted: true
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  AuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      DBClusterIdentifier: !Ref AuroraCluster
      PubliclyAccessible: false
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  # ── RDS Proxy (connection pooling for serverless Lambda) ──────────────────
  RdsProxyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub trak-rds-proxy-role-${Stage}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: rds.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReadAuroraSecret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - kms:Decrypt
                Resource: !Ref AuroraSecret

  RdsProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: !Sub trak-proxy-${Stage}
      EngineFamily: POSTGRESQL
      RoleArn: !GetAtt RdsProxyRole.Arn
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Ref AuroraSecret
          IAMAuth: REQUIRED
      VpcSubnetIds: !Ref DbSubnetIds
      VpcSecurityGroupIds:
        - !Ref RdsProxySecurityGroup
      RequireTLS: true
      IdleClientTimeout: 1800
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  RdsProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RdsProxy
      TargetGroupName: default
      DBClusterIdentifiers:
        - !Ref AuroraCluster
      ConnectionPoolConfigurationInfo:
        MaxConnectionsPercent: 90
        MaxIdleConnectionsPercent: 50

  # ── Lambda: Sources (shared catalog — GET public, POST/PUT admin) ─────────
  SourcesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-sources-${Stage}
      CodeUri: functions/sources/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Race source catalog — list, add, update
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref DbSubnetIds
      Environment:
        Variables:
          AURORA_PROXY_ENDPOINT: !GetAtt RdsProxy.Endpoint
          DB_NAME: !Ref DbName
          DB_USERNAME: !Ref DbMasterUsername
      Events:
        List:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /sources
            Method: GET
            Auth:
              Authorizer: NONE
        GetOne:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /sources/{id}
            Method: GET
            Auth:
              Authorizer: NONE
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /sources
            Method: POST
        Update:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /sources/{id}
            Method: PUT

  # ── Lambda: Subscriptions (runner ↔ source) ───────────────────────────────
  SubscriptionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trak-subscriptions-${Stage}
      CodeUri: functions/subscriptions/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Runner source subscriptions — list, add, update, remove
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref DbSubnetIds
      Environment:
        Variables:
          AURORA_PROXY_ENDPOINT: !GetAtt RdsProxy.Endpoint
          DB_NAME: !Ref DbName
          DB_USERNAME: !Ref DbMasterUsername
      Events:
        List:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /subscriptions
            Method: GET
        Create:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /subscriptions
            Method: POST
        Update:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /subscriptions/{id}
            Method: PUT
        Delete:
          Type: Api
          Properties:
            RestApiId: !Ref TrakApi
            Path: /subscriptions/{id}
            Method: DELETE

  # ── ACM Certificate (DNS-validated via Route 53) ─────────────────────────
  TrakApiCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !If [IsProd, "api.trackmyraces.com", "dev.api.trackmyraces.com"]
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !If [IsProd, "api.trackmyraces.com", "dev.api.trackmyraces.com"]
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  # ── API Gateway Custom Domain ─────────────────────────────────────────────
  TrakApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Properties:
      DomainName: !If [IsProd, "api.trackmyraces.com", "dev.api.trackmyraces.com"]
      RegionalCertificateArn: !Ref TrakApiCertificate
      EndpointConfiguration:
        Types: [REGIONAL]
      Tags:
        - { Key: Project, Value: Trak }
        - { Key: Stage,   Value: !Ref Stage }

  # ── Base Path Mapping (root — no prefix) ─────────────────────────────────
  TrakApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Properties:
      DomainName: !Ref TrakApiCustomDomain
      RestApiId: !Ref TrakApi
      Stage: !Ref Stage

  # ── Route 53 A record (alias to regional API Gateway endpoint) ───────────
  TrakApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !If [IsProd, "api.trackmyraces.com.", "dev.api.trackmyraces.com."]
      Type: A
      AliasTarget:
        DNSName: !GetAtt TrakApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt TrakApiCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

# ─── Outputs ──────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint (raw)
    Value: !Sub "https://${TrakApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
    Export:
      Name: !Sub TrakApiUrl-${Stage}

  CustomDomainUrl:
    Description: Custom domain API endpoint
    Value: !If [IsProd, "https://api.trackmyraces.com", "https://dev.api.trackmyraces.com"]
    Export:
      Name: !Sub TrakCustomDomainUrl-${Stage}

  TableName:
    Description: DynamoDB table name
    Value: !Ref TrakTable
    Export:
      Name: !Sub TrakTable-${Stage}

  AuroraEndpoint:
    Description: Aurora cluster writer endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
    Export:
      Name: !Sub TrakAuroraEndpoint-${Stage}

  RdsProxyEndpoint:
    Description: RDS Proxy endpoint (use this from Lambda)
    Value: !GetAtt RdsProxy.Endpoint
    Export:
      Name: !Sub TrakRdsProxyEndpoint-${Stage}

  AuroraSecurityGroupId:
    Description: Aurora cluster security group ID (used by bastion stack)
    Value: !Ref AuroraSecurityGroup
    Export:
      Name: !Sub TrakAuroraSecurityGroup-${Stage}

  VpcId:
    Description: VPC ID (used by bastion stack)
    Value: !Ref VpcId
    Export:
      Name: !Sub TrakVpcId-${Stage}
